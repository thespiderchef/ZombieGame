name: CMake CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -- -j

      - name: Run executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ -x ./build/ZombieGame ]; then ./build/ZombieGame; elif [ -x ./ZombieGame ]; then ./ZombieGame; else echo 'No executable to run'; fi

      - name: Run executable (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if exist build\ZombieGame.exe (build\ZombieGame.exe) else (echo No executable to run)
